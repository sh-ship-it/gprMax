name: gprMax CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          # We install these separately first so setup.py can see them
          pip install "numpy==1.26.4" "Cython==3.0.11"

      - name: Install gprMax and remaining requirements
        run: |
          # Now that numpy exists, this won't crash
          pip install -e .
          # Install the other test-specific tools
          pip install h5py==3.12.1 pytest colorama

      - name: Run Environment Validation
        run: |
          python -m pytest tests/test_env.py